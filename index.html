<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>デザインポートフォリオ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f4f4; color: #222; }
    header { background: #222; color: #fff; padding: 40px 0 20px 0; text-align: center; }
    header h1 { margin: 0; font-size: 2.5em; }
    header p { margin: 10px 0 0 0; font-size: 1.2em; }
    .container { max-width: 900px; margin: 30px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #ccc; padding: 30px; }
    h2 { border-left: 5px solid #222; padding-left: 10px; margin-top: 40px; }
    .works { display: flex; flex-wrap: wrap; gap: 24px; margin-top: 20px; }
    .work { background: #fafafa; border-radius: 6px; box-shadow: 0 1px 4px #ddd; width: 270px; padding: 16px; }
    .work img { width: 100%; border-radius: 4px; }
    .work-title { font-weight: bold; margin: 10px 0 5px 0; }
    .work-desc { font-size: 0.95em; color: #555; }
    form { margin-top: 20px; }
    input, textarea { width: 100%; padding: 8px; margin: 8px 0; border-radius: 4px; border: 1px solid #ccc; }
    button { background: #222; color: #fff; border: none; padding: 10px 24px; border-radius: 4px; font-size: 1em; cursor: pointer; }
    button:hover { background: #444; }
    @media (max-width: 800px) {
      .works { flex-direction: column; align-items: center; }
      .work { width: 90%; }
    }
  </style>
</head>
<body>
  <header>
    <h1>山田 太郎</h1>
    <p>デザイナー / ポートフォリオサイトへようこそ</p>
  </header>
  <div class="container">
    <h2>自己紹介</h2>
    <p>
      こんにちは。山田太郎です。UI/UXデザインやWebデザインを中心に活動しています。<br>
      シンプルで使いやすいデザインを心がけています。
    </p>
    <h2>ポートフォリオ</h2>
    <div class="works">
      <div class="work">
        <img src="https://placehold.jp/300x200.png" alt="作品1">
        <div class="work-title">作品タイトル1</div>
        <div class="work-desc">作品の簡単な説明が入ります。</div>
      </div>
      <div class="work">
        <img src="https://placehold.jp/300x200.png" alt="作品2">
        <div class="work-title">作品タイトル2</div>
        <div class="work-desc">作品の簡単な説明が入ります。</div>
      </div>
      <div class="work">
        <img src="https://placehold.jp/300x200.png" alt="作品3">
        <div class="work-title">作品タイトル3</div>
        <div class="work-desc">作品の簡単な説明が入ります。</div>
      </div>
    </div>
    <h2>お問い合わせ</h2>
    <form>
      <input type="text" placeholder="お名前" required>
      <input type="email" placeholder="メールアドレス" required>
      <textarea rows="4" placeholder="お問い合わせ内容" required></textarea>
      <button type="submit" onclick="alert('送信されました（ダミー）'); return false;">送信</button>
    </form>
  </div>
</body>
</html>
